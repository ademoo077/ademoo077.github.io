<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>مولّد تقارير الميدان — وﻻية الجزائر</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          ink: 'var(--bg-body)',
          surface: 'var(--bg-surface)',
          surface2: 'var(--bg-surface2)',
          line: 'var(--border-line)',
          muted: 'var(--text-muted)',
          textMain: 'var(--text-main)',
          dz:{red:'#D2122E',redD:'#A30E24',green:'#0E8345',gold:'#E8B948'}
        },
        fontFamily:{cairo:['Cairo','sans-serif'],mono:['JetBrains Mono','monospace']}
      }
    }
  };
</script>
<style>
  /* Variables CSS dynamiques pour le mode sombre/clair */
  :root {
    --bg-body: #0A0C0F;
    --bg-surface: #13171C;
    --bg-surface2: #1B2128;
    --border-line: #262D36;
    --text-main: #EDEFF2;
    --text-muted: #8B94A3;
  }
  body.light-mode {
    --bg-body: #F3F4F6;
    --bg-surface: #FFFFFF;
    --bg-surface2: #E5E7EB;
    --border-line: #D1D5DB;
    --text-main: #1F2937;
    --text-muted: #4B5563;
  }

  *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
  body{font-family:'Cairo',sans-serif;background: var(--bg-body); color: var(--text-main); transition: background 0.3s ease, color 0.3s ease;}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:#10141a}
  ::-webkit-scrollbar-thumb{background:#2a323c;border-radius:8px}
  .stamp-ring{box-shadow:0 0 0 1px rgba(210,18,46,.35),0 0 0 6px rgba(210,18,46,.06)}
  .dash-zone{
    background-image:
      repeating-linear-gradient(90deg,#2a323c,#2a323c 6px,transparent 6px,transparent 14px),
      repeating-linear-gradient(90deg,#2a323c,#2a323c 6px,transparent 6px,transparent 14px),
      repeating-linear-gradient(0deg,#2a323c,#2a323c 6px,transparent 6px,transparent 14px),
      repeating-linear-gradient(0deg,#2a323c,#2a323c 6px,transparent 6px,transparent 14px);
    background-size:100% 2px,100% 2px,2px 100%,2px 100%;
    background-position:0 0,0 100%,0 0,100% 0;
    background-repeat:no-repeat
  }
  @keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.35}}
  .live-dot{animation:pulse-live 1.6s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite}
  @keyframes gps-ring{0%{box-shadow:0 0 0 0 rgba(14,131,69,.5)}70%{box-shadow:0 0 0 10px rgba(14,131,69,0)}100%{box-shadow:0 0 0 0 rgba(14,131,69,0)}}
  .gps-pulse{animation:gps-ring 1.2s ease-out infinite}
  input[type="datetime-local"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.75}
  body.light-mode input[type="datetime-local"]::-webkit-calendar-picker-indicator { filter: invert(0); opacity: .65; }
  textarea:focus,input:focus,select:focus{outline:none;box-shadow:0 0 0 2px rgba(210,18,46,.45)}
  input[type="range"]{accent-color:#D2122E}
  canvas{image-rendering:auto}
  .copy-btn.copied{color:#0E8345!important;border-color:rgba(14,131,69,.4)!important}

  /* Style de la carte adaptatif au thème */
  body:not(.light-mode) .leaflet-tile-layer {
    filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
  }
  body:not(.light-mode) .leaflet-container {
    background: #13171C !important;
  }
  body:not(.light-mode) .leaflet-bar a {
    background-color: #1B2128 !important;
    color: #EDEFF2 !important;
    border-bottom: 1px solid #262D36 !important;
  }
</style>
</head>
<body class="min-h-screen pb-24 lg:pb-10">

<header class="border-b border-line bg-surface/80 backdrop-blur sticky top-0 z-30">
  <div class="max-w-7xl mx-auto px-4 lg:px-8 py-3.5 flex items-center gap-3">
    <div class="relative w-10 h-10 shrink-0 rounded-full bg-dz-red/10 stamp-ring flex items-center justify-center">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#D2122E" stroke-width="2">
        <path d="M12 21s7-6.4 7-12a7 7 0 1 0-14 0c0 5.6 7 12 7 12Z"/>
        <circle cx="12" cy="9" r="2.4" fill="#D2122E" stroke="none"/>
      </svg>
    </div>
    <div class="leading-tight" dir="auto">
      <h1 class="text-[15px] sm:text-base font-extrabold tracking-tight">مولّد تقارير الميدان</h1>
      <p class="text-[11px] sm:text-xs text-muted font-mono" dir="ltr">Wilaya d'Alger · Contrôle de voirie</p>
    </div>
    
    <div class="ms-auto flex items-center gap-3">
      <div class="hidden sm:flex items-center gap-1.5 text-[11px] font-mono text-muted" dir="ltr">
        <span class="w-1.5 h-1.5 rounded-full bg-dz-green live-dot"></span> Mode hors-ligne
      </div>
      <button id="themeToggle" type="button" class="w-9 h-9 rounded-lg bg-surface2 border border-line flex items-center justify-center hover:border-dz-red/40 transition" title="تغيير المظهر">
        <svg id="themeIcon" class="w-4 h-4 text-dz-gold" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="5"></circle>
          <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
          <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
        </svg>
      </button>
    </div>
  </div>
</header>

<main class="max-w-7xl mx-auto px-4 lg:px-8 py-6 grid lg:grid-cols-[460px_1fr] gap-6 items-start">

  <section class="space-y-5">

    <div class="bg-surface border border-line rounded-2xl p-4 sm:p-5">
      <div class="flex items-center gap-2.5 mb-4">
        <span class="w-7 h-7 rounded-full border border-dz-red/50 text-dz-red text-xs font-mono font-bold flex items-center justify-center">01</span>
        <h2 class="font-bold text-sm" dir="auto">الصور <span class="text-muted font-normal">— حتى 4 صور</span></h2>
      </div>
      <div class="grid grid-cols-2 gap-2 mb-3">
        <label class="dash-zone rounded-xl flex flex-col items-center justify-center gap-1.5 py-5 cursor-pointer hover:bg-surface2/60 transition">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8B94A3" stroke-width="1.6">
            <path d="M12 16V4m0 0L7 9m5-5 5 5"/>
            <path d="M4 16v3a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-3"/>
          </svg>
          <span class="text-[11px] text-muted font-bold" dir="auto">من الجهاز</span>
          <input id="fileInput" type="file" accept="image/*" multiple class="hidden">
        </label>
        <label class="dash-zone rounded-xl flex flex-col items-center justify-center gap-1.5 py-5 cursor-pointer hover:bg-surface2/60 transition">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8B94A3" stroke-width="1.6">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span class="text-[11px] text-muted font-bold" dir="auto">التقاط صورة</span>
          <input id="cameraInput" type="file" accept="image/*" capture="environment" class="hidden">
        </label>
      </div>
      <div id="thumbs" class="grid grid-cols-4 gap-2"></div>
    </div>

    <div class="bg-surface border border-line rounded-2xl p-4 sm:p-5 space-y-4">
      <div class="flex items-center gap-2.5">
        <span class="w-7 h-7 rounded-full border border-dz-red/50 text-dz-red text-xs font-mono font-bold flex items-center justify-center">02</span>
        <h2 class="font-bold text-sm" dir="auto">معلومات التقرير</h2>
      </div>

      <div>
        <label class="block text-[11px] text-muted mb-1.5 font-mono" dir="ltr">DATE & HEURE</label>
        <div class="flex gap-2">
          <input id="datetimeInput" type="datetime-local" dir="ltr" class="flex-1 bg-surface2 border border-line rounded-lg px-3 py-2.5 text-sm font-mono">
          <button id="nowBtn" type="button" class="px-3.5 rounded-lg bg-dz-green/15 text-dz-green text-xs font-bold border border-dz-green/30 hover:bg-dz-green/25 transition whitespace-nowrap" dir="auto">الآن</button>
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="text-[11px] text-muted font-mono" dir="ltr">LOCALISATION (TEXTE)</label>
          <button id="copyLocBtn" type="button" class="copy-btn flex items-center gap-1 px-2.5 py-1 rounded-md bg-surface2 border border-line text-muted text-[11px] font-bold hover:text-white hover:border-dz-red/40 transition">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>نسخ</span>
          </button>
        </div>
        <input id="locationInput" dir="auto" placeholder="طريق السبالة، أمام المؤسسة الاستشفائية، مرباح..." class="w-full bg-surface2 border border-line rounded-lg px-3 py-2.5 text-sm text-textMain">
      </div>

      <div class="bg-surface2/50 border border-line rounded-xl p-4 space-y-3">
        <div class="flex items-center justify-between">
          <span class="text-xs font-bold text-dz-green flex items-center gap-1.5 font-mono">
            <span class="w-2 h-2 rounded-full bg-dz-green gps-pulse"></span>
            إحداثيات الموقع الجغرافي (GPS)
          </span>
        </div>
        
        <button id="gpsBtn" type="button" class="w-full bg-dz-green hover:bg-[#0c6e3a] text-white text-sm font-bold py-3 px-4 rounded-xl transition shadow-lg shadow-dz-green/10 flex items-center justify-center gap-2 group">
          <svg id="gpsIcon" class="w-4 h-4 transition-transform group-hover:scale-110" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <circle cx="12" cy="12" r="3"/>
            <line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/>
            <line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/>
          </svg>
          <span id="gpsBtnTxt">تحديد الموقع الحالي عبر GPS</span>
        </button>

        <div class="bg-surface border border-line rounded-xl p-3 space-y-3">
          <div class="grid grid-cols-2 gap-2 text-center">
            <div class="bg-surface2/70 border border-line/60 rounded-lg p-2">
              <span class="block text-[10px] text-muted font-mono tracking-wider">LATITUDE</span>
              <span id="latDisplay" class="text-xs font-mono font-bold text-textMain">—</span>
            </div>
            <div class="bg-surface2/70 border border-line/60 rounded-lg p-2">
              <span class="block text-[10px] text-muted font-mono tracking-wider">LONGITUDE</span>
              <span id="lngDisplay" class="text-xs font-mono font-bold text-textMain">—</span>
            </div>
          </div>

          <div class="space-y-1">
            <div class="flex items-center justify-between">
              <span class="text-[10px] text-muted font-mono">LIEN GOOGLE MAPS</span>
              <button id="copyGpsPanelBtn" type="button" class="copy-btn flex items-center gap-1 px-2 py-0.5 rounded bg-surface2 border border-line text-muted text-[10px] font-bold hover:text-white transition">
                <span>نسخ الرابط</span>
              </button>
            </div>
            <div id="gpsLinkDisplay" class="bg-surface2/70 border border-line/60 rounded-lg p-2.5 font-mono text-[11px] text-dz-green/90 break-all select-all min-h-[36px] flex items-center" dir="ltr">
              —
            </div>
          </div>

          <div id="mapBox" class="hidden rounded-xl overflow-hidden border border-line h-48 relative z-10 mt-2">
            <div id="map" class="w-full h-full"></div>
          </div>
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-1.5">
          <label class="text-[11px] text-muted font-mono" dir="ltr">وصف الخلل / التقرير</label>
          <button id="copyReportBtn" type="button" class="copy-btn flex items-center gap-1 px-2.5 py-1 rounded-md bg-surface2 border border-line text-muted text-[11px] font-bold hover:text-white hover:border-dz-red/40 transition">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <rect x="9" y="9" width="13" height="13" rx="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            <span>نسخ</span>
          </button>
        </div>
        <textarea id="reportInput" dir="rtl" lang="ar" rows="3" placeholder="نقص في عملية الكنس داخل الملعب..." class="w-full bg-surface2 border border-line rounded-lg px-3 py-2.5 text-sm resize-none leading-relaxed text-textMain"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-3 pt-1">
        <div>
          <label class="block text-[11px] text-muted mb-1.5 font-mono" dir="ltr">الصيغة</label>
          <select id="formatSelect" dir="ltr" class="w-full bg-surface2 border border-line rounded-lg px-3 py-2.5 text-sm text-textMain">
            <option value="jpeg">JPEG</option>
            <option value="png">PNG</option>
          </select>
        </div>
        <div id="qualityWrap">
          <label class="block text-[11px] text-muted mb-1.5 font-mono" dir="ltr">الجودة <span id="qualityVal">92%</span></label>
          <input id="qualityRange" type="range" min="50" max="100" value="92" class="w-full mt-3">
        </div>
      </div>
    </div>
  </section>

  <section class="lg:sticky lg:top-[76px] space-y-4">
    <div class="bg-surface border border-line rounded-2xl p-4 sm:p-5">
      <div class="flex items-center justify-between mb-3">
        <div class="flex items-center gap-2.5">
          <span class="w-7 h-7 rounded-full border border-dz-red/50 text-dz-red text-xs font-mono font-bold flex items-center justify-center">03</span>
          <h2 class="font-bold text-sm" dir="auto">المعاينة والتصدير</h2>
        </div>
        <span class="flex items-center gap-1.5 text-[11px] font-mono text-muted" dir="ltr">
          <span class="w-1.5 h-1.5 rounded-full bg-dz-red live-dot"></span>live preview
        </span>
      </div>

      <div class="rounded-xl overflow-hidden border border-line bg-black/40 flex items-center justify-center min-h-[260px] mx-auto max-w-[560px]">
        <canvas id="reportCanvas" class="max-w-full h-auto block"></canvas>
      </div>

      <div class="flex gap-2 mt-4">
        <button id="downloadBtn" disabled type="button"
          class="flex-1 bg-dz-red disabled:bg-line disabled:text-muted disabled:cursor-not-allowed text-white font-bold text-sm rounded-lg py-3 hover:bg-dz-redD transition flex items-center justify-center gap-2" dir="auto">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 4v9m0 0 4-4m-4 4-4-4"/>
            <path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/>
          </svg>
          تحميل
        </button>
        <button id="waBtn" disabled type="button"
          class="flex-1 disabled:opacity-40 disabled:cursor-not-allowed text-[#25D366] border border-[#25D366]/35 bg-[#25D366]/10 font-bold text-sm rounded-lg py-3 hover:bg-[#25D366]/20 transition flex items-center justify-center gap-2" dir="auto">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/>
          </svg>
          واتساب
        </button>
        <button id="resetBtn" type="button"
          class="px-4 rounded-lg border border-line text-muted text-sm font-bold hover:text-white hover:border-dz-red/40 transition" dir="auto">↺</button>
      </div>
      <p class="text-[11px] text-muted font-mono mt-2 text-center" id="dimsLabel" dir="ltr">—</p>
    </div>
  </section>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
(function(){
"use strict";

const state = { images:[], dt:new Date(), location:'', report:'', gps:null };
const CW=1080, GRID_H=1080;

// Variables pour l'instance de carte L
