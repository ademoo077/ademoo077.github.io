<script>

    darkMode: 'class',

      extend: {
        colors: {
          ink: 'var(--color-ink)', surface: 'var(--color-surface)', surface2: 'var(--color-surface2)',
          line: 'var(--color-line)', muted: 'var(--color-muted)', textMain: 'var(--color-text)',
          dz:{red:'#D2122E',redD:'#A30E24',green:'#0E8345',gold:'#E8B948'}

<style>
  :root {
    /* Mode Clair */
    --color-ink: #f8fafc;
    --color-surface: #ffffff;
    --color-surface2: #f1f5f9;
    --color-line: #e2e8f0;
    --color-muted: #64748b;
    --color-text: #0f172a;
  }
  .dark {
    /* Mode Sombre */
    --color-ink: #0A0C0F;
    --color-surface: #13171C;
    --color-surface2: #1B2128;
    --color-line: #262D36;
    --color-muted: #8B94A3;
    --color-text: #EDEFF2;
  }
  
  *{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
  body{font-family:'Cairo',sans-serif; background:var(--color-ink); color:var(--color-text); transition:background 0.3s, color 0.3s;}
  ::-webkit-scrollbar{width:8px;height:8px}
  ::-webkit-scrollbar-track{background:var(--color-ink)}
  ::-webkit-scrollbar-thumb{background:var(--color-line);border-radius:8px}
  
  .stamp-ring{box-shadow:0 0 0 1px rgba(210,18,46,.35),0 0 0 6px rgba(210,18,46,.06)}
  .dash-zone{
    background-image:
      repeating-linear-gradient(90deg,var(--color-line),var(--color-line) 6px,transparent 6px,transparent 14px),
      repeating-linear-gradient(90deg,var(--color-line),var(--color-line) 6px,transparent 6px,transparent 14px),
      repeating-linear-gradient(0deg,var(--color-line),var(--color-line) 6px,transparent 6px,transparent 14px),
      repeating-linear-gradient(0deg,var(--color-line),var(--color-line) 6px,transparent 6px,transparent 14px);
    background-size:100% 2px,100% 2px,2px 100%,2px 100%;
    background-position:0 0,0 100%,0 0,100% 0;
    background-repeat:no-repeat
  }
  
  @keyframes pulse-live{0%,100%{opacity:1}50%{opacity:.35}}
  .live-dot{animation:pulse-live 1.6s ease-in-out infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .spin{animation:spin .8s linear infinite}
  @keyframes gps-ring{0%{box-shadow:0 0 0 0 rgba(14,131,69,.5)}70%{box-shadow:0 0 0 10px rgba(14,131,69,0)}100%{box-shadow:0 0 0 0 rgba(14,131,69,0)}}

  canvas{image-rendering:auto}
  .copy-btn.copied{color:#0E8345!important;border-color:rgba(14,131,69,.4)!important}
</style>

<script>
(function(){
"use strict";

const state = { images:[], dt:new Date(), location:'', report:'', instruction:'', gps:null };
const CW=1080, GRID_H=1080;

/* ---- Sauvegarde Hors-Ligne (IndexedDB) ---- */
const DB_NAME = 'RapportTerrainDB';
const STORE_NAME = 'drafts';

function openDB() {
  return new Promise((resolve, reject) => {
    const request = indexedDB.open(DB_NAME, 1);
    request.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(STORE_NAME)) {
        db.createObjectStore(STORE_NAME, { keyPath: 'id' });
      }
    };
    request.onsuccess = () => resolve(request.result);
    request.onerror = () => reject(request.error);
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });
}

function base64ToBlob(base64) {
  const arr = base64.split(',');
  const mime = arr[0].match(/:(.*?);/)[1];
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while(n--) { u8arr[n] = bstr.charCodeAt(n); }
  return new Blob([u8arr], {type:mime});
async function saveDraft() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readwrite');
    const store = tx.objectStore(STORE_NAME);
    
    // Convertir les nouvelles images en Base64 seulement si ce n'est pas encore fait
    const imagesToSave = await Promise.all(state.images.map(async img => {
      let b64 = img.base64;
      if (!b64) {
         b64 = await fileToBase64(img.file);
         img.base64 = b64;
      }
      return {
        id: img.id,
        base64: b64,
        brightness: img.brightness,
        contrast: img.contrast
      };
    }));

    const draftData = {
      id: 'current_draft',
      dt: state.dt.getTime(),
      location: state.location,
      report: state.report,
      instruction: state.instruction,
      gps: state.gps,
      images: imagesToSave
    };

    store.put(draftData);
  } catch (err) {
    console.error("Erreur de sauvegarde hors-ligne", err);
  }
}

async function loadDraft() {
  try {
    const db = await openDB();
    const tx = db.transaction(STORE_NAME, 'readonly');
    const store = tx.objectStore(STORE_NAME);
    const request = store.get('current_draft');
    
    request.onsuccess = () => {
      const data = request.result;
      if (data) {
        state.dt = new Date(data.dt);
        datetimeInput.value = toInput(state.dt);
        
        state.location = data.location || '';
        locationInput.value = state.location;
        
        state.report = data.report || '';
        reportInput.value = state.report;
        
        state.instruction = data.instruction || '';
        instructionInput.value = state.instruction;
        if(state.instruction) instructionWrap.classList.remove('hidden');
        
        state.gps = data.gps;
        if(state.gps) {
          latDisplay.textContent = state.gps.lat;
          lngDisplay.textContent = state.gps.lng;
          gpsBtnTxt.textContent='تحديث إحداثيات GPS';
          
          const mapDiv = $('mapContainer');
          mapDiv.classList.remove('hidden');
          
          if (!map) {
            map = L.map('mapContainer').setView([state.gps.lat, state.gps.lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
              maxZoom: 19,
              attribution: '© OpenStreetMap'
            }).addTo(map);
            mapMarker = L.marker([state.gps.lat, state.gps.lng]).addTo(map);
          }
        }

        if(data.images && data.images.length > 0) {
          data.images.forEach(imgData => {
            const blob = base64ToBlob(imgData.base64);
            const file = new File([blob], "image_restauree.jpg", { type: blob.type });
            state.images.push({
              id: imgData.id,
              file: file,
              url: URL.createObjectURL(file),
              img: null,
              brightness: imgData.brightness || 100,
              contrast: imgData.contrast || 100,
              base64: imgData.base64
            });
          });
          renderThumbs();
          updateBtns();
        }
        scheduleRedraw();
        toast('تم استعادة التقرير المحفوظ تلقائياً', '#0E8345', '#fff'); // Brouillon restauré (Arabe)
      }
    };
  } catch (err) {
    console.error("Erreur de chargement du brouillon", err);
  }
}

async function clearDraft() {
  try {
    const db = await openDB();
    db.transaction(STORE_NAME, 'readwrite').objectStore(STORE_NAME).delete('current_draft');
  } catch (err) {
    console.error("Erreur de suppression du brouillon", err);
  }
}

/* ---- copier ---- */
function clip(text,btn){
  if(!text || text === '—'){toast('لا يوجد نص لنسخه');return;}
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');
    const span=btn.querySelector('span')||btn;
    const prev=span.textContent;
    span.textContent='✓ تم';
    setTimeout(()=>{btn.classList.remove('copied');span.textContent=prev;},1800);
    toast('✓ تم النسخ بنجاح', '#0E4D2A', '#fff');
  }).catch(()=>toast('تعذر النسخ تلقائياً'));
}

}

/* ---- dessin ---- */
function cover(ctx,imgObj,x,y,w,h,g){
  const img = imgObj.img;
  const ix=x+g/2,iy=y+g/2,iw=w-g,ih=h-g;
  const sc=Math.max(iw/img.width,ih/img.height);
  const sw=iw/sc,sh=ih/sc,sx=(img.width-sw)/2,sy=(img.height-sh)/2;
  
  ctx.save();
  ctx.filter = `brightness(${imgObj.brightness}%) contrast(${imgObj.contrast}%)`;
  ctx.drawImage(img,sx,sy,sw,sh,ix,iy,iw,ih);
  ctx.restore();
}
function drawGrid(ctx,imgsData,W,H){
  ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
  if(!imgsData.length){
    ctx.fillStyle='#1B2128';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#5b6573';ctx.direction='rtl';ctx.font='600 30px Cairo,sans-serif';
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('أضف صورة واحدة على الأقل للمعاينة',W/2,H/2);return;
  }
  const g=6;
  if(imgsData.length===1){cover(ctx,imgsData[0],0,0,W,H,0);}
  else if(imgsData.length===2){cover(ctx,imgsData[0],0,0,W/2,H,g);cover(ctx,imgsData[1],W/2,0,W/2,H,g);}
  else if(imgsData.length===3){
    cover(ctx,imgsData[0],0,0,W,H*.56,g);
    cover(ctx,imgsData[1],0,H*.56,W/2,H*.44,g);cover(ctx,imgsData[2],W/2,H*.56,W/2,H*.44,g);
  } else {
    cover(ctx,imgsData[0],0,0,W/2,H/2,g);cover(ctx,imgsData[1],W/2,0,W/2,H/2,g);
    cover(ctx,imgsData[2],0,H/2,W/2,H/2,g);cover(ctx,imgsData[3],W/2,H/2,W/2,H/2,g);
  }
}
function wrap(ctx,text,maxW){
  const words=text.split(/\s+/).filter(Boolean);
  const lines=[];let cur='';
  for(const w of words){const t=cur?cur+' '+w:w;if(ctx.measureText(t).width>maxW&&cur){lines.push(cur);cur=w;}else cur=t;}
  if(cur)lines.push(cur);return lines;
}
function fitP(ctx,text,maxW,weight,maxL,sz0,szMin){
  let sz=sz0,lines=[];
  while(sz>=szMin){ctx.font=`${weight} ${sz}px Cairo,sans-serif`;lines=wrap(ctx,text,maxW);if(lines.length<=maxL)break;sz-=2;}
  return{sz,lines};
}
function roundedRect(ctx,x,y,w,h,r){
  const rr=Math.min(r,w/2,h/2);
  ctx.beginPath();
  ctx.moveTo(x+rr,y);
  ctx.lineTo(x+w-rr,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+rr);
  ctx.lineTo(x+w,y+h-rr);
  ctx.quadraticCurveTo(x+w,y+h,x+w-rr,y+h);
  ctx.lineTo(x+rr,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-rr);
  ctx.lineTo(x,y+rr);
  ctx.quadraticCurveTo(x,y,x+rr,y);
  ctx.closePath();
}
function drawTopInstruction(ctx,text,W){
  if(!text) return;

  ctx.save();
  ctx.direction='rtl';
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  const maxW=W-180;
  const fitted=fitP(ctx,text,maxW,800,2,46,28);
  const lines=fitted.lines;
  const sz=fitted.sz;
  const lineH=sz*1.32;
  ctx.font=`800 ${sz}px Cairo,sans-serif`;

  let longest=0;
  for(const ln of lines) longest=Math.max(longest,ctx.measureText(ln).width);

  const padX=46,padY=16;
  const boxW=Math.min(W-120,Math.max(420,longest+padX*2));
  const boxH=lines.length*lineH+padY*2;
  const x=(W-boxW)/2,y=24;

  ctx.shadowColor='rgba(0,0,0,.55)';
  ctx.shadowBlur=14;
  ctx.shadowOffsetY=4;
  ctx.fillStyle='#D2122E';
  roundedRect(ctx,x,y,boxW,boxH,4);
  ctx.fill();

  ctx.shadowBlur=0;
  ctx.shadowOffsetY=0;
  ctx.fillStyle='#fff';
  ctx.strokeStyle='rgba(0,0,0,.45)';
  ctx.lineWidth=6;
  ctx.lineJoin='round';

  let ty=y+padY+lineH/2;
  for(const ln of lines){
    ctx.strokeText(ln,W/2,ty);
    ctx.fillText(ln,W/2,ty);
    ty+=lineH;
  }
  ctx.restore();
}
async function drawComposite(){
  await ensureLoaded();
  const ctx=canvas.getContext('2d');
  const padX=60,padT=34,padB=34,gap=16,maxW=CW-padX*2;
  ctx.direction='rtl';
  const locRaw=state.location.trim();
  let locSz=0,locL=[];
  if(locRaw){const f=fitP(ctx,`الموقع: ${locRaw}`,maxW,700,2,26,18);locSz=f.sz;locL=f.lines;}
  const repRaw=state.report.trim();
  const fR=fitP(ctx,repRaw||'يرجى إدخال وصف التقرير الميداني',maxW,800,6,38,22);
  const repSz=fR.sz,repL=fR.lines;
  const locH=locSz*1.5,repH=repSz*1.42,gB=locL.length?gap:0;
  let bandH=padT+locL.length*locH+gB+repL.length*repH+padB;
  bandH=Math.min(Math.max(bandH,160),650);
  canvas.width=CW;canvas.height=GRID_H+bandH;
  
  drawGrid(ctx,state.images,CW,GRID_H);
  
  const instructionRaw=state.instruction.trim();
  drawTopInstruction(ctx,instructionRaw,CW);

  const dtTxt=fmtDate(state.dt);
  ctx.direction='ltr';ctx.font='italic 800 34px Cairo,sans-serif';
  ctx.lineJoin='round';ctx.lineWidth=7;ctx.strokeStyle='rgba(0,0,0,.55)';
  if(instructionRaw){
    ctx.textAlign='right';ctx.textBaseline='bottom';
    ctx.strokeText(dtTxt,CW-26,GRID_H-22);ctx.fillStyle='#fff';ctx.fillText(dtTxt,CW-26,GRID_H-22);
  } else {
    ctx.textAlign='left';ctx.textBaseline='top';
    ctx.strokeText(dtTxt,26,22);ctx.fillStyle='#fff';ctx.fillText(dtTxt,26,22);
  }
  ctx.fillStyle='#D2122E';ctx.fillRect(0,GRID_H,CW,bandH);
  ctx.direction='rtl';ctx.textAlign='center';ctx.textBaseline='top';
  let y=GRID_H+padT;
  if(locL.length){ctx.font=`700 ${locSz}px Cairo,sans-serif`;ctx.fillStyle='rgba(255,255,255,.9)';for(const ln of locL){ctx.fillText(ln,CW/2,y);y+=locH;}y+=gB;}
  ctx.font=`800 ${repSz}px Cairo,sans-serif`;ctx.fillStyle=repRaw?'#fff':'rgba(255,255,255,.5)';
  for(const ln of repL){ctx.fillText(ln,CW/2,y);y+=repH;}
  dimsLabel.textContent=`${canvas.width} × ${canvas.height} px`;
}
let rafP=false;
function scheduleRedraw(){if(rafP)return;rafP=true;requestAnimationFrame(()=>{rafP=false;drawComposite();});}

async function download(){

  const q=fmt==='jpeg'?Number(qualityRange.value)/100:undefined;
  canvas.toBlob(blob=>{
    if(!blob){toast('خطأ أثناء معالجة الصورة');return;}
    const stamp=`${state.dt.getFullYear()}${pad2(state.dt.getMonth()+1)}${pad2(state.dt.getDate())}_${pad2(state.dt.getHours())}${pad2(state.dt.getMinutes())}`;
    const a=document.createElement('a');

    a.href=URL.createObjectURL(blob);

    setTimeout(()=>URL.revokeObjectURL(a.href),4000);
    toast('✓ تم حفظ الصورة', '#0E8345', '#fff');
  },mime,q);
}

/* ---- PWA : Manifest & Service Worker virtuels ---- */
function initPWA() {
  const manifest = {
    name: "مولّد تقارير الميدان",
    short_name: "التقارير",
    description: "تطبيق لتوليد تقارير الميدان لولاية الجزائر",
    display: "standalone",
    start_url: ".",
    background_color: "#0A0C0F",
    theme_color: "#D2122E",
    scope: "/",
    orientation: "portrait-primary",
    icons: [{
      src: "logo wilaya.png",
      sizes: "192x192",
      type: "image/png",
      purpose: "any"
    }, {
      src: "logo wilaya.png",
      sizes: "512x512",
      type: "image/png",
      purpose: "maskable"
    }]
  };
  const manifestLink = document.createElement('link');
  manifestLink.rel = 'manifest';
  manifestLink.href = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(JSON.stringify(manifest));
  document.head.appendChild(manifestLink);

  if ('serviceWorker' in navigator) {
    const swCode = `
      const CACHE_NAME = 'dz-rapport-v1';
      const ASSETS = [location.href, 'logo wilaya.png'];
      
      self.addEventListener('install', e => {
        e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
      });
      
      self.addEventListener('activate', e => {
        e.waitUntil(clients.claim());
      });
      
      self.addEventListener('fetch', e => {
        e.respondWith(caches.match(e.request).then(res => res || fetch(e.request)));
      });
    `;
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);
    
    navigator.serviceWorker.register(swUrl).catch(err => console.error("PWA Erreur:", err));
  }
}
initPWA();

})();
